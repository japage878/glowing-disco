<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroForge - Aerospace Contract Manufacturer</title>
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="header">
  <div id="logo">✈️ AEROFORGE</div>
  <span id="company-name" title="Click Rename to change">AeroForge Industries</span>
  <span id="level-badge" class="level-badge level-1">Lv.1 Startup</span>
  <span id="cash-display">$500K</span>

  <div id="xp-container">
    <div id="xp-track"><div id="xp-bar"></div></div>
    <span id="xp-text">0 / 100 XP</span>
  </div>

  <span id="date-display">Jan 2024 Q1</span>
  <span id="reputation-stars" title="Company Reputation">★☆☆☆☆</span>
  <span id="research-points" title="Research Points">⚗️ 0 RP</span>
  <span id="credit-score-display" title="Credit Score">🏦 680</span>

  <div class="header-buttons">
    <button class="hdr-btn hdr-btn-bank" id="bank-btn" title="Open Finance Center">🏦 Bank</button>
    <button class="hdr-btn" id="rename-btn" title="Rename company">✏️ Rename</button>
    <button class="hdr-btn" id="save-btn" title="Save game">💾 Save</button>
    <button class="hdr-btn" id="new-game-btn" title="Start new game">🆕 New Game</button>
  </div>
</header>

<!-- ===== ACTIVE EVENTS BANNER ===== -->
<div id="active-events-banner"></div>

<!-- ===== MAIN LAYOUT ===== -->
<div id="main">

  <!-- === FACTORY GRID === -->
  <div id="grid-area">
    <div id="grid-area-inner">
      <div id="factory-grid"></div>
    </div>
  </div>

  <!-- === SIDEBAR === -->
  <div id="sidebar">

    <!-- Active Contracts -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>🔧 Active Contracts</span>
        <span id="active-count" style="color:var(--green)"></span>
      </div>
      <div class="sidebar-section-content" id="contracts-active"></div>
    </div>

    <!-- Available Contracts -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>📋 Available Contracts</span>
        <span style="color:var(--text-muted);font-size:0.75em">Auto-refreshes</span>
      </div>
      <div class="sidebar-section-content" style="max-height:220px;" id="contracts-available"></div>
    </div>

    <!-- Events Feed -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>📡 Events</span>
      </div>
      <div class="sidebar-section-content event-section" id="event-feed"></div>
    </div>

    <!-- Banking / Finance -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>🏦 Finance & Credit</span>
        <button class="sidebar-hdr-btn" onclick="UI.openBankModal()">Loans →</button>
      </div>
      <div id="bank-panel"></div>
    </div>

    <!-- Research / Tech Tree -->
    <div class="sidebar-section" id="tech-panel-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="sidebar-section-header">
        <span>🔬 Research & Tech</span>
      </div>
      <div id="tech-panel"></div>
    </div>

  </div><!-- end sidebar -->
</div><!-- end main -->

<!-- ===== BOTTOM BAR ===== -->
<div id="bottom-bar">
  <div id="build-menu-header">🏗️ Build Menu — Click to select, then click grid cell to place</div>
  <div id="build-menu"></div>
  <div id="stats-bar"></div>
</div>

<!-- ===== BUILDING MODAL ===== -->
<div id="building-modal">
  <div id="modal-box">
    <button id="modal-close" title="Close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ===== BANK MODAL ===== -->
<div id="bank-modal">
  <div id="bank-modal-box">
    <button id="bank-modal-close" title="Close">✕</button>
    <div id="bank-modal-content"></div>
  </div>
</div>

<!-- ===== GAME OVER OVERLAY ===== -->
<div id="gameover-overlay">
  <div id="gameover-box">
    <div id="gameover-title">Game Over</div>
    <p id="gameover-message"></p>
    <div id="gameover-stats"></div>
    <button id="gameover-restart">🚀 Play Again</button>
  </div>
</div>

<!-- ===== TOAST CONTAINER ===== -->
<div id="toast-container"></div>

<!-- ===== SCRIPTS ===== -->
<script src="js/data.js"></script>
<script src="js/buildings.js"></script>
<script src="js/banking.js"></script>
<script src="js/scrap.js"></script>
<script src="js/contracts.js"></script>
<script src="js/events.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
